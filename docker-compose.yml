services:
  # ============ Infrastructure ============
  kafka:
    image: apache/kafka:3.7.1
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    networks:
      - smartevent-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - smartevent-network

  # ============ Databases ============
  users-db:
    image: postgres:16-alpine
    container_name: users-db
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - users-db-data:/var/lib/postgresql/data
    networks:
      - smartevent-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  events-db:
    image: postgres:16-alpine
    container_name: events-db
    environment:
      POSTGRES_DB: events_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - events-db-data:/var/lib/postgresql/data
    networks:
      - smartevent-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  bookings-db:
    image: postgres:16-alpine
    container_name: bookings-db
    environment:
      POSTGRES_DB: bookings_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - bookings-db-data:/var/lib/postgresql/data
    networks:
      - smartevent-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  payments-db:
    image: postgres:16-alpine
    container_name: payments-db
    environment:
      POSTGRES_DB: payments_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - payments-db-data:/var/lib/postgresql/data
    networks:
      - smartevent-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============ Services ============
  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    networks:
      - smartevent-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8888/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  discovery-server:
    build: ./discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      - CONFIG_SERVER_URL=config-server
      - EUREKA_HOSTNAME=discovery-server
    networks:
      - smartevent-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8081:8081"
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      users-db:
        condition: service_healthy
    environment:
      - CONFIG_SERVER_URL=config-server
      - EUREKA_SERVER_URL=discovery-server
      - DB_HOST=users-db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - ZIPKIN_HOST=zipkin
    networks:
      - smartevent-network

  event-service:
    build: ./event-service
    container_name: event-service
    ports:
      - "8082:8082"
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      events-db:
        condition: service_healthy
    environment:
      - CONFIG_SERVER_URL=config-server
      - EUREKA_SERVER_URL=discovery-server
      - DB_HOST=events-db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - ZIPKIN_HOST=zipkin
    networks:
      - smartevent-network

  booking-service:
    build: ./booking-service
    container_name: booking-service
    ports:
      - "8083:8083"
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      bookings-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - CONFIG_SERVER_URL=config-server
      - EUREKA_SERVER_URL=discovery-server
      - DB_HOST=bookings-db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - KAFKA_HOST=kafka
      - ZIPKIN_HOST=zipkin
    networks:
      - smartevent-network

  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "8085:8085"
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      payments-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - CONFIG_SERVER_URL=config-server
      - EUREKA_SERVER_URL=discovery-server
      - DB_HOST=payments-db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - KAFKA_HOST=kafka
      - ZIPKIN_HOST=zipkin
    networks:
      - smartevent-network

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8084:8084"
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - CONFIG_SERVER_URL=config-server
      - EUREKA_SERVER_URL=discovery-server
      - KAFKA_HOST=kafka
      - ZIPKIN_HOST=zipkin
    networks:
      - smartevent-network

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      - CONFIG_SERVER_URL=config-server
      - EUREKA_SERVER_URL=discovery-server
      - ZIPKIN_HOST=zipkin
    networks:
      - smartevent-network

# ============ Volumes & Networks ============
volumes:
  users-db-data:
  events-db-data:
  bookings-db-data:
  payments-db-data:

networks:
  smartevent-network:
    driver: bridge